name: Release Builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Windows build
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch libmpv-2.dll from shinchiro mpv-dev release
        shell: pwsh
        run: |
          $ProgressPreference = "SilentlyContinue"
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets |
            Where-Object { $_.name -like "mpv-dev-x86_64-2*" } |
            Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets |
              Where-Object { $_.name -like "mpv-dev-x86_64*" } |
              Select-Object -First 1
          }
          Write-Host "Downloading $($asset.name)"
          $tmp = "$env:RUNNER_TEMP\mpv-dev.7z"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $tmp
          7z e $tmp -o"$env:GITHUB_WORKSPACE" "libmpv-2.dll" -y
          if (-not (Test-Path "$env:GITHUB_WORKSPACE\libmpv-2.dll")) {
            Write-Error "libmpv-2.dll not extracted"
            exit 1
          }

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest Pillow

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build with PyInstaller
        run: pyinstaller ForgePlayer.spec --noconfirm --clean

      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\ForgePlayer\ForgePlayer.exe")) {
            Write-Error "Build artifact not found"
            exit 1
          }

      - name: Build Windows installer (NSIS)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v',''
          if (-not $ver) { $ver = "0.0.0" }
          # NSIS is NOT preinstalled on windows-latest — install it (Chocolatey
          # ships on the runner). makensis lands in Program Files (x86)\NSIS.
          choco install nsis -y --no-progress
          $nsis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            $cmd = Get-Command makensis -ErrorAction SilentlyContinue
            if ($cmd) { $nsis = $cmd.Source }
          }
          if (-not (Test-Path $nsis)) { Write-Error "makensis not found after install"; exit 1 }
          # Pass the absolute repo root so the .nsi uses absolute asset paths
          # (NSIS resolves relative paths against the script dir, not CWD).
          $root = (Get-Location).Path
          Write-Host "makensis: $nsis  version: $ver  root: $root"
          & "$nsis" "/DVERSION=$ver" "/DROOTDIR=$root" "installer\forgeplayer.nsi"
          if ($LASTEXITCODE -ne 0) { Write-Error "makensis failed"; exit 1 }
          if (-not (Test-Path "dist\ForgePlayer-Setup.exe")) {
            Write-Error "Installer not produced"
            exit 1
          }

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path dist\ForgePlayer -DestinationPath dist\ForgePlayer-windows.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ForgePlayer-windows
          path: |
            dist/ForgePlayer-windows.zip
            dist/ForgePlayer-Setup.exe

  # ---------------------------------------------------------------------------
  # macOS build
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build — macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libmpv via Homebrew
        run: brew install mpv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Generate .icns icon
        run: |
          ICO_SRC="branding/forgeplayer_icon.png"
          ICNS_OUT="branding/forgeplayer.icns"
          if [ -f "$ICO_SRC" ] && [ ! -f "$ICNS_OUT" ]; then
            ICONSET_DIR="$(mktemp -d)/ForgePlayer.iconset"
            mkdir -p "$ICONSET_DIR"
            for SIZE in 16 32 64 128 256 512; do
              sips -z "$SIZE" "$SIZE" "$ICO_SRC" --out "$ICONSET_DIR/icon_${SIZE}x${SIZE}.png" 2>/dev/null
              DOUBLE=$((SIZE * 2))
              sips -z "$DOUBLE" "$DOUBLE" "$ICO_SRC" --out "$ICONSET_DIR/icon_${SIZE}x${SIZE}@2x.png" 2>/dev/null
            done
            iconutil -c icns "$ICONSET_DIR" -o "$ICNS_OUT"
            rm -rf "$(dirname "$ICONSET_DIR")"
          fi

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build with PyInstaller
        run: pyinstaller ForgePlayer.spec --noconfirm --clean

      - name: Verify build
        run: |
          if [ ! -d "dist/ForgePlayer.app" ] && [ ! -d "dist/ForgePlayer" ]; then
            echo "Build artifact not found"
            exit 1
          fi

      - name: Zip artifact
        run: |
          cd dist
          if [ -d "ForgePlayer.app" ]; then
            zip -r ForgePlayer-macos.zip ForgePlayer.app
          else
            zip -r ForgePlayer-macos.zip ForgePlayer
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForgePlayer-macos
          path: dist/ForgePlayer-macos.zip

  # ---------------------------------------------------------------------------
  # Linux build
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build — Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (libmpv + Qt runtime bits)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv2 \
            libmpv-dev \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -q

      - name: Build with PyInstaller
        env:
          QT_QPA_PLATFORM: offscreen
        run: pyinstaller ForgePlayer.spec --noconfirm --clean

      - name: Verify build
        run: |
          if [ ! -f "dist/ForgePlayer/ForgePlayer" ]; then
            echo "Build artifact not found"
            exit 1
          fi

      - name: Create tarball
        run: tar -czf dist/ForgePlayer-linux.tar.gz -C dist ForgePlayer

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForgePlayer-linux
          path: dist/ForgePlayer-linux.tar.gz

  # ---------------------------------------------------------------------------
  # Publish a GitHub Release with all three artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ForgePlayer-windows
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ForgePlayer-macos
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ForgePlayer-linux
          path: artifacts/

      - name: Compute release name
        id: relname
        run: |
          TAG="${GITHUB_REF_NAME}"
          STRIPPED="${TAG#v}"
          NAME="ForgePlayer ${STRIPPED//-/ }"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: liquid-releasing/forgeplayer-releases
          token: ${{ secrets.RELEASES_PAT }}
          name: ${{ steps.relname.outputs.name }}
          # Full "Latest" release on GitHub so the website's /releases/latest
          # download buttons resolve to it. Beta status is conveyed by the
          # site's "Pre-release software" note + the body banner below, not by
          # GitHub's prerelease flag (which would hide the cut from /latest).
          prerelease: false
          files: |
            artifacts/ForgePlayer-Setup.exe
            artifacts/ForgePlayer-windows.zip
            artifacts/ForgePlayer-macos.zip
            artifacts/ForgePlayer-linux.tar.gz
          body: |
            > ⚠️ **Pre-1.0 development release.** Active development; expect rough edges.

            ForgePlayer is a synchronized multi-screen player with per-port device routing. Drop a FunscriptForge or ForgeAssembler scene pack into the Library and ForgePlayer plays it across your screens — with audio routed separately to scene speakers, your Haptic 1 stim port, and (optionally) a Haptic 2 prostate port — all from the same timeline.

            **What's new since the last cut:**
            - **Smoother 4K playback** — video now decodes on the GPU when available (`hwdec=auto-safe`), offloading it from the CPU. Fixes the freezes/stutter on large, high-bitrate 4K (e.g. AI-upscaled sources) that previously choked the processor — and, with it, the haptic sync. Falls back to software decode automatically for anything the GPU can't handle. **A GPU is not required**, but it plays big 4K far more smoothly.
            - **"Now playing" header on Live** — the Live tab now names the active scene, and for FunscriptForge exports the origin `<stem>.forge` bundle, so you always see what's loaded rather than just a relinked video filename
            - **Clearer Scene Audio labels** — the Scene Audio line names the scene instead of the raw (often cache-named) video file

            **Device compatibility:** mechanical, 2b, stereostim, FOC-stim — supported via pre-rendered stim audio (mp3) or live funscript synthesis (vendored restim).

            ## Downloads
            - **Windows (installer, recommended)** — `ForgePlayer-Setup.exe` — installs ForgePlayer and registers `.forge` bundles so a double-click opens them in the player
            - **Windows (portable)** — `ForgePlayer-windows.zip` — unzip and run `ForgePlayer.exe`
            - **macOS** — `ForgePlayer-macos.zip` — unzip and open `ForgePlayer.app`
            - **Linux** — `ForgePlayer-linux.tar.gz` — extract and run `ForgePlayer/ForgePlayer`

            **First run:** open **Setup**, pick your Scene Audio and Haptic 1 devices (and Haptic 2 if you have a second stim dongle), then **Library → Scan a folder** at your media root. Click a scene tile to activate it; press Play.

            Questions, bug reports, and feedback welcome in [our Discord](https://discord.gg/MHucAwwRc).
          append_body: true
          # Auto-prepend the commit/PR list since the previous tag.
          # Cross-project policy (FA, FunscriptForge, ForgeYT, FP) —
          # cheap per-version notes for minor releases; curated body
          # via CHANGELOG / tag-message for major/marketing releases.
          generate_release_notes: true

      - name: Notify forgeplayer-web to bump version badge
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/liquid-releasing/forgeplayer-web/dispatches \
            -f event_type='release-published' \
            -f 'client_payload[tag]'="$TAG_NAME" \
            || echo "::warning::forgeplayer-web dispatch failed — repo may not exist yet. Badge will stay on previous version until next release."
